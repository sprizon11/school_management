# Render.com — Blueprint (optional: New > Blueprint > connect repo)
services:
  - type: web
    name: school-management-api
    runtime: node
    rootDir: backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npx prisma migrate deploy && npm run start:prod
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: SEED_STUDENT_COUNT
        value: 250
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: DEV_PLATFORM_KEY
        sync: false
      - key: DEV_PORTAL_EMAIL
        sync: false
      - key: DEV_PORTAL_PASSWORD
        sync: false

  - type: web
    name: school-dev-portal
    runtime: static
    rootDir: dev-portal
    buildCommand: npm run build
    staticPublishPath: .
    envVars:
      - key: PORTAL_API_BASE
        value: https://school-management-9yzh.onrender.com/api
