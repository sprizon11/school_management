# Render.com — Blueprint (optional: New > Blueprint > connect repo)
services:
  - type: web
    name: school-management-api
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm run start:prod
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: SEED_STUDENT_COUNT
        value: 250
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
