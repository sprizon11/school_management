workflows:
  ios-unsigned:
    name: iOS Unsigned Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        API_BASE_URL: "https://school-management-9yzh.onrender.com/api"
    scripts:
      - name: Flutter pub get
        script: |
          set -e
          flutter --version
          cd mobile
          flutter pub get

      - name: Patch Xcode project
        script: |
          set -e
          PBXPROJ="mobile/ios/Runner.xcodeproj/project.pbxproj"
          sed -i '' '/DEVELOPMENT_TEAM/d' "$PBXPROJ"
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' "$PBXPROJ"
          sed -i '' 's/CODE_SIGN_IDENTITY = "iPhone Developer";/CODE_SIGN_IDENTITY = "";/g' "$PBXPROJ"
          sed -i '' 's/CODE_SIGN_IDENTITY = "Apple Development";/CODE_SIGN_IDENTITY = "";/g' "$PBXPROJ"
          echo "Patch done."
          grep -n "CODE_SIGN\|DEVELOPMENT_TEAM\|SKIP_INSTALL" "$PBXPROJ" | head -20

      - name: Pod install
        script: |
          set -e
          cd mobile/ios
          pod install --repo-update

      - name: Archive with xcodebuild
        script: |
          set -eo pipefail
          cd mobile

          xcodebuild archive \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -archivePath /tmp/Runner.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            ENABLE_BITCODE=NO \
            SKIP_INSTALL=NO \
            2>&1 | tee /tmp/xcode_archive.log

          echo "=== xcarchive apps ==="
          find /tmp/Runner.xcarchive -name "*.app" -type d

      - name: Package IPA
        script: |
          set -e
          APP_PATH=$(find /tmp/Runner.xcarchive -name "*.app" -type d \
            | grep -v iphonesimulator | head -1)
          echo "App: $APP_PATH"
          ls "$APP_PATH/Info.plist"

          mkdir -p /tmp/Payload
          cp -r "$APP_PATH" /tmp/Payload/
          cd /tmp
          zip -r Runner.ipa Payload
          echo "IPA: $(du -h Runner.ipa)"

    artifacts:
      - /tmp/Runner.ipa
      - /tmp/xcode_archive.log
