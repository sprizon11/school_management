workflows:
  ios-unsigned:
    name: iOS Unsigned Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        API_BASE_URL: "https://school-management-9yzh.onrender.com/api"
    scripts:
      - name: Flutter pub get
        script: |
          set -e
          flutter --version
          cd mobile
          flutter pub get

      - name: Patch Xcode project
        script: |
          set -e
          PBXPROJ="mobile/ios/Runner.xcodeproj/project.pbxproj"
          sed -i '' '/DEVELOPMENT_TEAM/d' "$PBXPROJ"
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' "$PBXPROJ"
          sed -i '' 's/CODE_SIGN_IDENTITY = "iPhone Developer";/CODE_SIGN_IDENTITY = "";/g' "$PBXPROJ"
          sed -i '' 's/CODE_SIGN_IDENTITY = "Apple Development";/CODE_SIGN_IDENTITY = "";/g' "$PBXPROJ"
          echo "Patch done."

      - name: Pod install
        script: |
          set -e
          cd mobile/ios
          pod install --repo-update

      - name: Archive with xcodebuild
        script: |
          set -e
          cd mobile

          xcodebuild archive \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -archivePath /tmp/Runner.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            ENABLE_BITCODE=NO \
            SKIP_INSTALL=NO \
            2>&1 | tee /tmp/xcode_archive.log

          echo "=== xcarchive structure ==="
          find /tmp/Runner.xcarchive -maxdepth 5 2>/dev/null \
            | tee /tmp/xcarchive_list.txt \
            || echo "No xcarchive found" | tee /tmp/xcarchive_list.txt

      - name: Package IPA
        script: |
          set -e

          # Show xcarchive structure
          echo "=== xcarchive contents ==="
          cat /tmp/xcarchive_list.txt || true

          # Find .app ANYWHERE inside the xcarchive (not just standard path)
          APP_PATH=$(find /tmp/Runner.xcarchive -name "*.app" -type d 2>/dev/null \
            | grep -v iphonesimulator | head -1) || true
          echo "Found app: $APP_PATH"

          if [ -z "$APP_PATH" ] || [ ! -f "$APP_PATH/Info.plist" ]; then
            echo "ERROR: No .app with Info.plist found in xcarchive."
            echo "All .app dirs found:"
            find /tmp -name "*.app" -type d 2>/dev/null || true
            exit 1
          fi

          mkdir -p /tmp/Payload
          cp -r "$APP_PATH" /tmp/Payload/
          cd /tmp
          zip -r Runner.ipa Payload
          echo "IPA: $(du -h Runner.ipa)"

    artifacts:
      - /tmp/Runner.ipa
      - /tmp/xcode_archive.log
      - /tmp/xcarchive_list.txt
