workflows:
  ios-unsigned:
    name: iOS Unsigned Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        API_BASE_URL: "https://school-management-9yzh.onrender.com/api"
    scripts:
      - name: Flutter pub get
        script: |
          set -e
          flutter --version
          cd mobile
          flutter pub get

      - name: Patch Xcode project (remove team requirement)
        script: |
          set -e
          PBXPROJ="mobile/ios/Runner.xcodeproj/project.pbxproj"
          # Remove DEVELOPMENT_TEAM entries
          sed -i '' '/DEVELOPMENT_TEAM/d' "$PBXPROJ"
          # Switch to Manual signing
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' "$PBXPROJ"
          # Clear code sign identity
          sed -i '' 's/CODE_SIGN_IDENTITY = "iPhone Developer";/CODE_SIGN_IDENTITY = "";/g' "$PBXPROJ"
          sed -i '' 's/CODE_SIGN_IDENTITY = "Apple Development";/CODE_SIGN_IDENTITY = "";/g' "$PBXPROJ"
          echo "Patch applied."

      - name: Pod install
        script: |
          set -e
          cd mobile/ios
          pod install --repo-update

      - name: Build iOS no-codesign
        script: |
          set -e
          cd mobile
          flutter build ios --release --no-codesign \
            --dart-define=API_BASE_URL=$API_BASE_URL \
            2>&1 | tee /tmp/flutter_build.log
          echo "--- Build output ---"
          ls -la build/ios/iphoneos/ || echo "iphoneos dir not found"

      - name: Package IPA
        script: |
          set -e
          cd mobile
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r Runner.ipa Payload
          rm -rf Payload
          echo "IPA size: $(du -h Runner.ipa)"

    artifacts:
      - mobile/Runner.ipa
      - /tmp/flutter_build.log
