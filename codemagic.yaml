workflows:
  ios-unsigned:
    name: iOS Unsigned Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        API_BASE_URL: "https://school-management-9yzh.onrender.com/api"
    scripts:
      - name: Flutter pub get
        script: |
          set -e
          flutter --version
          cd mobile
          flutter pub get

      - name: Pod install
        script: |
          set -e
          cd mobile/ios
          pod install --repo-update

      - name: Build iOS unsigned
        script: |
          set -e
          cd mobile

          # Generate dart defines env file that Xcode can read
          DART_DEFINE_B64=$(echo -n "API_BASE_URL=$API_BASE_URL" | base64)

          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            ENABLE_BITCODE=NO \
            DART_DEFINES="$DART_DEFINE_B64" \
            -derivedDataPath /tmp/DerivedData \
            build \
            2>&1 | tee /tmp/xcode_build.log

          echo "Build done. Looking for .app:"
          find /tmp/DerivedData -name "Runner.app" -type d | head -5

      - name: Package IPA
        script: |
          set -e
          APP_PATH=$(find /tmp/DerivedData -name "Runner.app" -type d | head -1)
          echo "Packaging: $APP_PATH"
          mkdir -p /tmp/Payload
          cp -r "$APP_PATH" /tmp/Payload/
          cd /tmp
          zip -r Runner.ipa Payload
          echo "IPA size: $(du -h Runner.ipa)"

    artifacts:
      - /tmp/Runner.ipa
      - /tmp/xcode_build.log
