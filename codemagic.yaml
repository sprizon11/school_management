workflows:
  # iOS free install — no Apple Developer Program required.
  # Download smartschool_free.ipa from artifacts, then install with Sideloadly
  # on Windows using your free Apple ID (re-sign every ~7 days).
  ios-free-workflow:
    name: SmartSchool iOS (Free Install)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    working_directory: mobile
    scripts:
      - name: Get Flutter packages
        script: |
          flutter config --no-enable-swift-package-manager
          flutter pub get
      - name: Install CocoaPods dependencies
        script: |
          cd ios
          rm -rf Pods Podfile.lock Runner.xcworkspace/xcshareddata/swiftpm
          pod install --repo-update
      - name: Build unsigned iOS app
        script: |
          flutter clean
          flutter pub get
          cd ios && pod install && cd ..
          flutter build ios --release --no-codesign
      - name: Package IPA for Sideloadly
        script: |
          APP_PATH="build/ios/iphoneos/Runner.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Runner.app not found — searching build/ios..."
            APP_PATH="$(find build/ios -name Runner.app -type d | head -n 1)"
          fi
          if [ -z "$APP_PATH" ] || [ ! -d "$APP_PATH" ]; then
            echo "Could not locate Runner.app after build."
            find build/ios -maxdepth 4 -type d
            exit 1
          fi
          rm -rf Payload smartschool_free.ipa
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -qr smartschool_free.ipa Payload
          rm -rf Payload
          ls -lh smartschool_free.ipa
    artifacts:
      - mobile/smartschool_free.ipa

  # Android — works without Apple account. Download APK from Codemagic artifacts.
  android-workflow:
    name: SmartSchool Android
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      java: 17
    working_directory: mobile
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Set up Android SDK
        script: |
          set -e
          yes | sdkmanager --licenses || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "platforms;android-35" \
            "build-tools;35.0.0"
      - name: Build release APK
        script: |
          flutter build apk --release --no-tree-shake-icons
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
