workflows:
  ios-unsigned:
    name: iOS Unsigned Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        API_BASE_URL: "https://school-management-9yzh.onrender.com/api"
    scripts:
      - name: Flutter pub get
        script: |
          set -e
          flutter --version
          cd mobile
          flutter pub get
          echo "Podfile generated:"
          cat ios/Podfile | head -5 || echo "No Podfile!"
      - name: Pod install
        script: |
          set -e
          cd mobile/ios
          pod install --repo-update
      - name: Build iOS no-codesign
        script: |
          set -e
          cd mobile
          echo "Building..."
          flutter build ios --release --no-codesign --dart-define=API_BASE_URL=$API_BASE_URL
          echo "Build complete"
          ls -la build/ios/iphoneos/ || echo "iphoneos dir not found"
      - name: Package IPA
        script: |
          set -e
          cd mobile
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r Runner.ipa Payload
          rm -rf Payload
          echo "IPA size: $(du -h Runner.ipa)"
    artifacts:
      - mobile/Runner.ipa
