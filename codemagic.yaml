workflows:
  ios-unsigned:
    name: iOS Unsigned Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        API_BASE_URL: "https://school-management-9yzh.onrender.com/api"
    scripts:
      - name: Flutter pub get
        script: |
          set -e
          flutter --version
          cd mobile
          flutter pub get

      - name: Patch Xcode project
        script: |
          set -e
          PBXPROJ="mobile/ios/Runner.xcodeproj/project.pbxproj"
          sed -i '' '/DEVELOPMENT_TEAM/d' "$PBXPROJ"
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' "$PBXPROJ"
          sed -i '' 's/CODE_SIGN_IDENTITY = "iPhone Developer";/CODE_SIGN_IDENTITY = "";/g' "$PBXPROJ"
          sed -i '' 's/CODE_SIGN_IDENTITY = "Apple Development";/CODE_SIGN_IDENTITY = "";/g' "$PBXPROJ"
          echo "Patch done."

      - name: Pod install
        script: |
          set -e
          cd mobile/ios
          pod install --repo-update

      - name: Build iOS and find app
        script: |
          cd mobile

          # Run flutter build - ignore exit code, Xcode still compiles Dart
          flutter build ios --release --no-codesign \
            --dart-define=API_BASE_URL=$API_BASE_URL \
            2>&1 | tee /tmp/flutter_build.log || true

          echo "=== Searching for Runner.app everywhere ==="
          find . -name "Runner.app" -type d 2>/dev/null | grep -v Pods || true
          find "$HOME" -name "Runner.app" -type d 2>/dev/null \
            | grep -v iphonesimulator | grep -v Pods | head -10 || true
          find /private/var -name "Runner.app" -type d 2>/dev/null \
            | grep -v iphonesimulator | grep -v Pods | head -5 || true

          echo "=== build/ios tree ==="
          find build/ios -maxdepth 5 -name "*.app" -o -name "Runner" 2>/dev/null | head -20 || true

      - name: Package IPA
        script: |
          set -e
          cd mobile

          # Search all possible locations
          APP_PATH=$(find . "$HOME" /private/var -name "Runner.app" -type d 2>/dev/null \
            | grep -v iphonesimulator | grep -v Pods | grep -v ".build" | head -1) || true

          echo "Found: $APP_PATH"

          if [ -z "$APP_PATH" ] || [ ! -f "$APP_PATH/Info.plist" ]; then
            echo "ERROR: Runner.app with Info.plist not found. Listing all .app folders:"
            find . "$HOME" -name "Runner.app" -type d 2>/dev/null | head -20 || true
            exit 1
          fi

          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r Runner.ipa Payload
          rm -rf Payload
          echo "IPA: $(du -h Runner.ipa)"

    artifacts:
      - mobile/Runner.ipa
      - /tmp/flutter_build.log
