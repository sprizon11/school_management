workflows:
  ios-unsigned:
    name: iOS Unsigned Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        API_BASE_URL: "https://school-management-9yzh.onrender.com/api"
    scripts:
      - name: Flutter pub get
        script: |
          set -e
          flutter --version
          cd mobile
          flutter pub get

      - name: Patch Xcode project (remove team requirement)
        script: |
          set -e
          PBXPROJ="mobile/ios/Runner.xcodeproj/project.pbxproj"
          sed -i '' '/DEVELOPMENT_TEAM/d' "$PBXPROJ"
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' "$PBXPROJ"
          sed -i '' 's/CODE_SIGN_IDENTITY = "iPhone Developer";/CODE_SIGN_IDENTITY = "";/g' "$PBXPROJ"
          sed -i '' 's/CODE_SIGN_IDENTITY = "Apple Development";/CODE_SIGN_IDENTITY = "";/g' "$PBXPROJ"
          echo "Patch applied."

      - name: Pod install
        script: |
          set -e
          cd mobile/ios
          pod install --repo-update

      - name: Build iOS (Xcode completes even if Flutter reports failure)
        script: |
          cd mobile
          # Flutter will say "failed" due to team check, but Xcode actually builds the .app
          # Use || true so the script continues after Flutter's false failure
          flutter build ios --release --no-codesign \
            --dart-define=API_BASE_URL=$API_BASE_URL \
            2>&1 | tee /tmp/flutter_build.log || true

          echo "=== Looking for Runner.app ==="
          find . -name "Runner.app" -type d 2>/dev/null | grep -v Pods | head -10
          find "$HOME/Library/Developer/Xcode/DerivedData" -name "Runner.app" -type d 2>/dev/null \
            | grep -v iphonesimulator | head -5 || true
          echo "=== build/ios contents ==="
          ls -la build/ios/ 2>/dev/null || echo "build/ios not found"
          ls -la build/ios/iphoneos/ 2>/dev/null || echo "iphoneos dir not found"

      - name: Package IPA
        script: |
          set -e
          cd mobile

          # Try the expected Flutter output path first
          APP_PATH="build/ios/iphoneos/Runner.app"

          # Fallback: search DerivedData
          if [ ! -d "$APP_PATH" ]; then
            echo "Not at expected path, searching..."
            APP_PATH=$(find "$HOME/Library/Developer/Xcode/DerivedData" -name "Runner.app" \
              -not -path "*iphonesimulator*" -not -path "*/Pods/*" -type d 2>/dev/null | head -1)
          fi

          echo "Using app at: $APP_PATH"
          ls -la "$APP_PATH/Info.plist" || (echo "ERROR: No Info.plist found!" && exit 1)

          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r Runner.ipa Payload
          rm -rf Payload
          echo "IPA size: $(du -h Runner.ipa)"

    artifacts:
      - mobile/Runner.ipa
      - /tmp/flutter_build.log
