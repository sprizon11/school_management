workflows:
  ios-unsigned:
    name: iOS Unsigned Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        API_BASE_URL: "https://school-management-9yzh.onrender.com/api"
    scripts:
      - name: Get Flutter packages
        script: |
          set -e
          echo "Flutter version:"
          flutter --version
          cd mobile
          flutter pub get
      - name: Build iOS no-codesign
        script: |
          set -e
          cd mobile
          echo "Starting flutter build ios..."
          flutter build ios --release --no-codesign --dart-define=API_BASE_URL=$API_BASE_URL
          echo "Build done. Listing output:"
          ls -la build/ios/iphoneos/ || echo "iphoneos folder not found"
      - name: Package IPA
        script: |
          set -e
          cd mobile
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r Runner.ipa Payload
          rm -rf Payload
          echo "IPA created: $(du -h Runner.ipa)"
    artifacts:
      - mobile/Runner.ipa
